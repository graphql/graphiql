# a hash comment stays a comment

"Top-level type description"
type User {
  "Field description"
  fullName("Argument description" prefix: String = "Mr."): String
    @deprecated(reason: "use displayName")
  tags(filter: [String!] = ["active", "verified"]): [String!]!
}

"Input description"
input UserFilter {
  "Input field description"
  limit: Int = 10
  name: String = "anon"
  note: String = """
  block string default value
  """
}

"""
Block description
"""
enum Role {
  "Enum value description"
  ADMIN
  MEMBER
}

directive @sample(
  "Directive argument description"
  mode: String = "fast"
) on FIELD_DEFINITION

query {
  search(
    term: "single line value"
    body: """
    block string value
    """
  ) {
    id
  }
}

"Operation description"
query GetUser(
  "Variable description"
  $id: ID = "default-id"
) {
  user(id: $id) {
    ...UserFields
  }
}

"Fragment description"
fragment UserFields on User {
  name
}
